<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COC AI 守秘人 - 常暗之厢</title>
<style>
:root {
  /* 克苏鲁深渊色调 — Eldritch Lovecraftian Theme */
  --bg-primary: #0a0e1a;
  --bg-secondary: #0f1729;
  --bg-tertiary: #1a2438;
  --bg-panel: #0d1522;
  --crimson: #8b1a1a;
  --crimson-light: #c0392b;
  --eldritch-green: #37f499;
  --eldritch-teal: #04d1f9;
  --eldritch-purple: #7081d0;
  --eldritch-amber: #f7c67f;
  --gold: #8a7a4a;
  --gold-light: #c9a94e;
  --text-primary: #cdd6f0;
  --text-secondary: #7a8bbf;
  --text-muted: #4a5a7a;
  --green: #1a4a2a;
  --green-light: #37f499;
  --blue: #1a2a5a;
  --blue-light: #5a8bdf;
  --border: #1e2a4a;
  --border-light: #2a3a5a;
  --radius: 6px;
  --radius-lg: 10px;
  --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font);
  background: var(--bg-primary);
  color: var(--text-primary);
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* Top Bar */
.topbar {
  height: 44px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 10px;
  flex-shrink: 0;
}
.topbar .logo { font-size: 14px; font-weight: 600; color: var(--crimson-light); letter-spacing: 0.5px; }
.topbar .logo span { color: var(--text-muted); font-weight: 400; font-size: 11px; margin-left: 4px; }
.topbar .spacer { flex: 1; }
.topbar button {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  padding: 4px 10px;
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 11px;
  transition: all 0.15s;
}
.topbar button:hover { background: var(--border-light); color: var(--text-primary); }
.topbar .tutorial-btn { background: var(--crimson); color: var(--text-primary); border-color: var(--crimson-light); }
.topbar .tutorial-btn:hover { background: var(--crimson-light); color: #fff; }

/* Main Layout */
.main { display: flex; flex: 1; overflow: hidden; }

/* Left Panel */
.left-panel {
  width: 260px;
  min-width: 260px;
  background: var(--bg-panel);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  overflow-x: hidden;
  transition: all 0.3s;
}
.left-panel.collapsed { min-width: 0; width: 0; padding: 0; border: none; }
.panel-header {
  padding: 10px 12px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  font-size: 12px;
  font-weight: 600;
  color: var(--crimson-light);
  display: flex;
  align-items: center;
  gap: 6px;
  position: sticky;
  top: 0;
  z-index: 2;
}

.char-section {
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
}
.char-section:last-child { border-bottom: none; }
.char-section h4 {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-muted);
  margin-bottom: 6px;
}
.stat-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 3px 0;
  font-size: 12px;
}
.stat-row .label { color: var(--text-secondary); }
.stat-row .value { color: var(--text-primary); font-weight: 500; }
.stat-row.san .value { color: var(--crimson-light); font-weight: 600; }
.stat-row.hp .value { color: var(--green-light); font-weight: 600; }

.bar-wrap { margin: 3px 0; }
.bar-bg { height: 6px; background: var(--bg-tertiary); border-radius: 3px; overflow: hidden; }
.bar-fill-san { height: 100%; background: var(--crimson); border-radius: 3px; transition: width 0.5s; }
.bar-fill-hp { height: 100%; background: var(--green); border-radius: 3px; transition: width 0.5s; }
.bar-fill-luck { height: 100%; background: var(--gold); border-radius: 3px; transition: width 0.5s; }

.attr-mini {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 3px;
}
.attr-box {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 4px 6px;
  text-align: center;
}
.attr-box .an { font-size: 9px; color: var(--text-muted); text-transform: uppercase; }
.attr-box .av { font-size: 14px; font-weight: 600; color: var(--text-primary); }

.inv-item { font-size: 11px; padding: 2px 0; color: var(--text-secondary); }

/* 背包UI */
.backpack-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
.bp-slot { background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: var(--radius); padding: 4px 6px; font-size: 10px; color: var(--text-secondary); cursor: pointer; transition: all 0.15s; min-height: 28px; display: flex; align-items: center; gap: 4px; }
.bp-slot:hover { border-color: var(--eldritch-teal); background: var(--bg-secondary); }
.bp-slot .bp-icon { font-size: 12px; opacity: 0.6; }
.bp-slot.equipped { border-color: var(--eldritch-green); border-left: 2px solid var(--eldritch-green); }
.bp-slot.weapon { border-color: var(--crimson-light); border-left: 2px solid var(--crimson-light); }

/* 属性等级标签 */
.attr-tier { font-size: 9px; padding: 1px 5px; border-radius: 8px; display: inline-block; font-weight: 500; letter-spacing: 0.3px; }
.tier-average { background: #1a2a3a; color: var(--text-secondary); }
.tier-above { background: #1a2a1a; color: var(--eldritch-green); }
.tier-strong { background: #1a1a2a; color: var(--blue-light); }
.tier-weak { background: #2a1a1a; color: var(--crimson-light); }
.tier-extreme { background: #2a2010; color: var(--gold-light); }
.tier-feeble { background: #1a0a0a; color: #666; }

/* 金钱显示 */
.wealth-display { background: var(--bg-tertiary); border: 1px solid var(--gold); border-radius: var(--radius); padding: 6px 8px; margin-bottom: 6px; font-size: 11px; }
.wealth-display .coin { color: var(--gold-light); font-weight: 600; }

/* 技能输入框可见性增强 */
.skill-input { width:48px !important; text-align:center; background:var(--bg-secondary) !important; border:1px solid var(--border-light) !important; border-radius:var(--radius) !important; color:var(--eldritch-teal) !important; font-size:13px !important; font-weight:600 !important; padding:4px !important; }
.skill-input:focus { border-color:var(--eldritch-green) !important; outline:none; box-shadow:0 0 6px rgba(4,209,249,0.3); }
.skill-label { flex:1; font-size:12px !important; color:var(--text-secondary) !important; }
.skill-base { font-size:9px !important; color:var(--text-muted) !important; }
.skill-pct { width:32px; text-align:right; font-size:11px !important; color:var(--eldritch-amber) !important; font-weight:500; }

/* Center Panel */
.center-panel { flex: 1; display: flex; flex-direction: column; background: var(--bg-primary); min-width: 0; }

/* Tutorial Bar */
.tutorial-bar {
  padding: 8px 16px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.tutorial-bar .t-label { font-size: 10px; color: var(--crimson-light); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
.tutorial-bar .t-step {
  font-size: 11px;
  color: var(--text-secondary);
  padding: 2px 8px;
  border-radius: 10px;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all 0.15s;
}
.tutorial-bar .t-step:hover { border-color: var(--crimson-light); color: var(--text-primary); }
.tutorial-bar .t-step.done { background: var(--green); color: #fff; border-color: var(--green); }
.tutorial-bar .t-step.current { background: var(--crimson); color: var(--text-primary); border-color: var(--crimson-light); }
.tutorial-bar .t-step.locked { opacity: 0.4; cursor: not-allowed; }

.chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 14px 18px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.chat-empty {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: var(--text-muted);
  text-align: center;
  padding: 40px;
}
.chat-empty h2 { font-size: 22px; color: var(--crimson-light); margin-bottom: 6px; font-weight: 500; }
.chat-empty p { font-size: 13px; max-width: 440px; line-height: 1.7; color: var(--text-secondary); }

.msg {
  max-width: 88%;
  padding: 10px 14px;
  border-radius: var(--radius-lg);
  font-size: 13px;
  line-height: 1.7;
  animation: fadeIn 0.3s ease;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

.msg.kp {
  align-self: flex-start;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-left: 3px solid var(--crimson);
  color: var(--text-primary);
}
.msg.kp .sender { color: var(--crimson-light); font-size: 10px; font-weight: 600; margin-bottom: 3px; letter-spacing: 0.3px; }
.msg.player {
  align-self: flex-end;
  background: #101d14;
  border: 1px solid #1a2e20;
  border-right: 3px solid var(--green-light);
  color: var(--text-primary);
}
.msg.system {
  align-self: center;
  background: transparent;
  color: var(--text-muted);
  font-size: 11px;
  font-style: italic;
  text-align: center;
  padding: 3px 8px;
}
.msg.dice {
  align-self: center;
  background: var(--bg-tertiary);
  border: 1px solid var(--crimson);
  border-radius: var(--radius-lg);
  padding: 8px 16px;
  text-align: center;
  color: var(--gold-light);
  font-size: 13px;
}
.msg.tip {
  align-self: center;
  background: #1a1a0c;
  border: 1px solid var(--gold);
  border-radius: var(--radius-lg);
  padding: 8px 14px;
  text-align: center;
  color: var(--gold-light);
  font-size: 12px;
  border-left: 3px solid var(--gold);
}
.msg.tip .tip-label { color: var(--gold); font-weight: 600; margin-bottom: 2px; }
.msg.rule {
  align-self: stretch;
  background: #120e1a;
  border: 1px solid #2a2040;
  border-radius: var(--radius-lg);
  padding: 10px 14px;
  color: var(--text-secondary);
  font-size: 12px;
  line-height: 1.6;
}
.msg.rule .rule-label { color: #8b6fcf; font-weight: 600; margin-bottom: 2px; }

/* Input Area */
.input-area {
  padding: 10px 14px;
  background: var(--bg-secondary);
  border-top: 1px solid var(--border);
  display: flex;
  gap: 6px;
  align-items: flex-end;
}
.input-area textarea {
  flex: 1;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-primary);
  padding: 8px 12px;
  font-size: 13px;
  font-family: var(--font);
  resize: none;
  min-height: 38px;
  max-height: 100px;
  outline: none;
}
.input-area textarea:focus { border-color: var(--crimson); }
.input-area textarea::placeholder { color: var(--text-muted); }

.quick-bar {
  display: flex;
  gap: 3px;
  padding: 4px 14px;
  background: var(--bg-secondary);
  border-top: 1px solid var(--border);
  flex-wrap: wrap;
}
.q-btn {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  padding: 3px 8px;
  border-radius: 12px;
  cursor: pointer;
  font-size: 10px;
  transition: all 0.15s;
}
.q-btn:hover { background: var(--border-light); color: var(--text-primary); }
.q-btn.dice { background: var(--crimson); color: var(--text-primary); border-color: var(--crimson-light); }

.send-btn {
  background: var(--crimson);
  border: none;
  color: #fff;
  padding: 8px 16px;
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
  transition: all 0.15s;
  height: 38px;
}
.send-btn:hover { background: var(--crimson-light); }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* Right Panel */
.right-panel {
  width: 240px;
  min-width: 240px;
  background: var(--bg-panel);
  border-left: 1px solid var(--border);
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}
.right-panel .tab-bar { display: flex; border-bottom: 1px solid var(--border); }
.right-panel .tab-btn {
  flex: 1; padding: 7px 0; text-align: center;
  background: none; border: none; border-bottom: 2px solid transparent;
  color: var(--text-muted); cursor: pointer; font-size: 11px; transition: all 0.15s;
}
.right-panel .tab-btn:hover { color: var(--text-secondary); }
.right-panel .tab-btn.active { color: var(--crimson-light); border-bottom-color: var(--crimson-light); }
.right-panel .tab-content { padding: 8px 12px; display: none; }
.right-panel .tab-content.active { display: block; }

.rule-card {
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 8px;
  margin-bottom: 5px;
  font-size: 11px;
  cursor: pointer;
  transition: all 0.15s;
}
.rule-card:hover { border-color: var(--crimson); }
.rule-card .rc-title { color: var(--crimson-light); font-weight: 500; margin-bottom: 2px; font-size: 12px; }
.rule-card .rc-desc { color: var(--text-muted); line-height: 1.5; }

/* Modals */
.modal-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.8);
  display: flex; align-items: center; justify-content: center;
  z-index: 100; animation: fadeIn 0.2s;
}
.modal {
  background: var(--bg-secondary);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-lg);
  padding: 20px;
  width: 500px;
  max-width: 95vw;
  max-height: 90vh;
  overflow-y: auto;
}
.modal h3 { color: var(--crimson-light); font-size: 16px; margin-bottom: 12px; }

.char-form { display: flex; flex-direction: column; gap: 8px; }
.char-form .row { display: flex; gap: 6px; }
.char-form .row > * { flex: 1; }
.char-form label { font-size: 10px; color: var(--text-muted); margin-bottom: 2px; display: block; }
.char-form input, .char-form select, .char-form textarea {
  width: 100%;
  background: var(--bg-tertiary);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-primary);
  padding: 6px 10px;
  font-size: 12px;
  outline: none;
  font-family: var(--font);
}
.char-form input:focus, .char-form select:focus { border-color: var(--crimson); }
.char-form textarea { min-height: 50px; resize: vertical; }
.char-form .stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 4px; }
.char-form .stat-item { background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: var(--radius); padding: 4px 6px; text-align: center; }
.char-form .stat-item .sn { font-size: 9px; color: var(--text-muted); }
.char-form .stat-item input { width: 100%; text-align: center; border: none; background: transparent; color: var(--text-primary); font-size: 14px; font-weight: 600; }

.modal button {
  width: 100%;
  padding: 8px;
  border: none;
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
  margin-top: 6px;
  transition: all 0.15s;
}
.modal .btn-primary { background: var(--crimson); color: #fff; }
.modal .btn-primary:hover { background: var(--crimson-light); }
.modal .btn-secondary { background: var(--bg-tertiary); color: var(--text-secondary); border: 1px solid var(--border); }

/* Dice Roller */
.dice-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; margin-bottom: 12px; }
.dice-btn {
  aspect-ratio: 1;
  background: var(--bg-tertiary);
  border: 2px solid var(--border);
  border-radius: var(--radius);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  cursor: pointer; font-size: 20px; transition: all 0.15s;
}
.dice-btn:hover { border-color: var(--crimson); }
.dice-btn.selected { border-color: var(--crimson); background: var(--crimson); }
.dice-btn .dl { font-size: 9px; color: var(--text-muted); }

.roll-display { text-align: center; font-size: 40px; font-weight: 700; color: var(--crimson-light); margin: 10px 0; animation: rollBounce 0.6s; }
@keyframes rollBounce { 0%{transform:scale(0.3);opacity:0} 50%{transform:scale(1.15)} 100%{transform:scale(1);opacity:1} }
.roll-label { text-align: center; font-size: 11px; color: var(--text-muted); margin-bottom: 8px; }
.roll-level { text-align: center; font-size: 14px; font-weight: 600; margin-bottom: 8px; }
.roll-level.success { color: var(--green-light); }
.roll-level.hard { color: var(--blue-light); }
.roll-level.extreme { color: var(--gold-light); }
.roll-level.crit { color: var(--gold); }
.roll-level.fumble { color: var(--crimson-light); }
.roll-level.fail { color: var(--text-muted); }

/* Scrollbar */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-light); }

@media (max-width: 800px) {
  .left-panel, .right-panel { display: none; }
}

.toast {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  background: var(--bg-secondary); border: 1px solid var(--crimson);
  color: var(--crimson-light); padding: 8px 20px; border-radius: 16px;
  font-size: 12px; z-index: 200; animation: fadeIn 0.3s;
}

.loading-dots { display: inline-flex; gap: 3px; padding: 6px 0; }
.loading-dots span {
  width: 5px; height: 5px; background: var(--crimson); border-radius: 50%;
  animation: dotPulse 1.4s infinite ease-in-out;
}
.loading-dots span:nth-child(2) { animation-delay: 0.2s; }
.loading-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dotPulse { 0%,80%,100%{opacity:0.3;transform:scale(0.8)} 40%{opacity:1;transform:scale(1)} }

/* ==================== 主页样式 ==================== */
.home-scroll { padding: 30px 24px; overflow-y: auto; height: 100%; }
.home-hero { text-align: center; margin-bottom: 30px; padding: 20px 0; }
.home-hero h1 { font-size: 32px; color: var(--eldritch-teal); margin: 0 0 8px; letter-spacing: 2px; text-shadow: 0 0 20px rgba(55,244,153,0.3); }
.home-hero .home-sub { color: var(--text-muted); font-size: 13px; margin: 0; }
.home-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; max-width: 800px; margin: 0 auto; }
.home-card { background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 24px 16px; text-align: center; cursor: pointer; transition: all 0.2s; }
.home-card:hover { border-color: var(--eldritch-teal); transform: translateY(-2px); box-shadow: 0 4px 16px rgba(55,244,153,0.15); }
.hc-icon { font-size: 36px; margin-bottom: 8px; }
.hc-title { font-size: 14px; color: var(--text-primary); font-weight: 600; margin-bottom: 4px; }
.hc-desc { font-size: 11px; color: var(--text-muted); }
.detail-panel { max-width: 800px; margin: 0 auto; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; }
.detail-panel h3 { margin: 0 0 16px; color: var(--eldritch-teal); font-size: 16px; }
.scenario-card { display: flex; gap: 16px; background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; align-items: flex-start; transition: all 0.2s; }
.scenario-card:hover { border-color: var(--eldritch-teal); }
.sc-icon { font-size: 36px; flex-shrink: 0; }
.sc-info { flex: 1; }
.sc-name { font-size: 16px; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; }
.sc-meta { font-size: 11px; color: var(--text-muted); margin: 2px 0; }
.sc-bg { font-size: 12px; color: var(--text-secondary); margin: 8px 0; line-height: 1.5; }
.sc-obj { font-size: 12px; color: var(--crimson-light); }
.sc-btn { background: var(--crimson); border: none; color: #fff; padding: 8px 16px; border-radius: var(--radius); cursor: pointer; font-size: 12px; flex-shrink: 0; align-self: center; }
.inv-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
.inv-pick-card { background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; cursor: pointer; transition: all 0.2s; }
.inv-pick-card:hover { border-color: var(--eldritch-teal); }
.inv-pick-card.add { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 90px; border-style: dashed; }
.ipc-name { font-size: 14px; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; }
.ipc-meta { font-size: 11px; color: var(--text-muted); }

function escapeHTML(s) {
  if (s === null || s === undefined) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function init() {
  renderRules();
  const saved = localStorage.getItem('coc-kp-state');
  if (saved) {
    try {
      const p = JSON.parse(saved);
      state = { ...state, ...p };
      if (!state.investigators) state.investigators = [];
      if (!state.sessions) state.sessions = [];
      // 一次性清理：移除残留的「藜麦」孤儿调查员（v4.6 删按钮后未清干净的数据）
      const before = state.investigators.length;
      state.investigators = state.investigators.filter(i => {
        const nm = (i.name || '').trim();
        return nm !== '藜麦' && nm !== '黎麦';
      });
      if (state.investigators.length !== before) {
        console.log(`[清理] 已移除 ${before - state.investigators.length} 个残留的黎麦/藜麦调查员`);
        // 同步清理关联的过往对话
        const validInvIds = new Set(state.investigators.map(i => i.id));
        state.sessions = state.sessions.filter(s => validInvIds.has(s.investigatorId));
        // 如果当前调查员是被删的，也清掉
        if (state.investigator && (state.investigator.name === '藜麦' || state.investigator.name === '黎麦')) {
          state.investigator = null;
          state.currentSessionId = null;
        }
      }
    } catch(e) {}
  }
  if (state.investigator) updateCharSheet();
  renderTutorialBar();
  renderClues();
  // 启动显示主页
  if (state.currentView !== 'play' || !state.currentSessionId) {
    state.currentView = 'home';
    state.currentSessionId = null;
    document.getElementById('home-area').style.display = '';
    document.getElementById('play-area').style.display = 'none';
    document.getElementById('left-panel').style.display = 'none';
  } else {
    // 恢复上次会话 — 但要先校验 investigator 和 sceneData 是否完整（防御性）
    if (!state.investigator || !state.investigator.id) {
      console.warn('[init] 恢复play视图时 investigator 缺失，回退到主页');
      state.currentView = 'home';
      state.currentSessionId = null;
      document.getElementById('home-area').style.display = '';
      document.getElementById('play-area').style.display = 'none';
      document.getElementById('left-panel').style.display = 'none';
    } else if (!state.sceneData || !state.sceneData.plotLock) {
      // 旧存档可能缺 sceneData 字段，尝试从对应 session 补
      const sess = state.sessions.find(s => s.id === state.currentSessionId);
      if (sess && sess.sceneData) {
        state.sceneData = JSON.parse(JSON.stringify(sess.sceneData));
      } else {
        console.warn('[init] 旧存档 sceneData 缺字段，重置');
        state.sceneData = {
          currentCar: 1, conductorAwake: false, hasKey: false,
          hasCrowbar: false, hasFlashlight: false,
          warningsTriggered: [], monsterDistance: 8,
          plotLock: ['conductor_helper', 'key_location', 'finale_brake'],
          plotEvents: []
        };
      }
      document.getElementById('home-area').style.display = 'none';
      document.getElementById('play-area').style.display = 'flex';
      document.getElementById('left-panel').style.display = '';
    } else {
      document.getElementById('home-area').style.display = 'none';
      document.getElementById('play-area').style.display = 'flex';
      document.getElementById('left-panel').style.display = '';
    }
  }
  renderHome();
}

function deleteInv(invId) {

  state.investigators = state.investigators.filter(i => i.id !== invId);
  // 清理该调查员相关的所有对话
  state.sessions = state.sessions.filter(s => s.investigatorId !== invId);
  if (state.investigator && state.investigator.id === invId) {
    state.investigator = null;
    state.currentSessionId = null;
  }
  autoSave();
  showToast('🗑 已删除');
  // 强制重新渲染：先清空再重新显示
  const detail = document.getElementById('home-detail');
  if (detail) detail.innerHTML = '';
  // 根据当前上下文决定显示哪一阶段
  if (state.currentScenarioId) showInvestigatorSelect(state.currentScenarioId);
  else showInvestigatorSelect();
  // 如果是空列表，强制再调用一次确保更新
  if (state.investigators.length === 0 && detail) {
    detail.innerHTML = `
      <div class="detail-panel">
        <h3>调查员档案</h3>
        <div class="empty-tip">还没有调查员，请先创建</div>

  // 创建新会话
  const session = {
    id: 'sess_' + Date.now() + '_' + Math.random().toString(36).slice(2,6),
    scenarioId: state.currentScenarioId,
    investigatorId: invId,
    name: `${inv.name} @ ${SCENARIOS.find(s=>s.id===state.currentScenarioId).name}`,
    messages: [],
    sceneData: {
      currentCar: 1, conductorAwake: false, hasKey: false,
      hasCrowbar: false, hasFlashlight: false,
      warningsTriggered: [], monsterDistance: 8,
      plotLock: ['conductor_helper', 'key_location', 'finale_brake'],
      plotEvents: []
    },
    lastPlayed: Date.now()
  };
  state.sessions.push(session);
  // 调查员复制到当前实例
  state.investigator = JSON.parse(JSON.stringify(inv));
  state.currentSessionId = session.id;
  state.gamePhase = 'idle';

  state.tutorialDone = false;

function continueSession(sessId) {
  const sess = state.sessions.find(s => s.id === sessId);
  if (!sess) return;
  const inv = state.investigators.find(i => i.id === sess.investigatorId);
  if (!inv) { alert('该调查员已被删除'); return; }
  // 关键修复#9：旧存档可能缺 sceneData 字段，补默认
  const sceneData = Object.assign({
    currentCar: 1, conductorAwake: false, hasKey: false,
    hasCrowbar: false, hasFlashlight: false,
    warningsTriggered: [], monsterDistance: 8,
    plotLock: ['conductor_helper', 'key_location', 'finale_brake'],
    plotEvents: []
  }, sess.sceneData || {});
  // 恢复会话状态
  state.currentSessionId = sessId;
  state.currentScenarioId = sess.scenarioId;
  state.investigator = JSON.parse(JSON.stringify(inv));
  state.sceneData = sceneData;
  // 关键修复#8：gamePhase=ended 允许玩家继续输入（回顾/重玩），不阻断流程
  state.gamePhase = sceneData.currentCar >= 7 ? 'ended' : 'playing';
  // 消息由 enterPlay 渲染
  enterPlay(true);
  if (state.gamePhase === 'ended') {
    setTimeout(() => {
      addMsg('system', `📜 该冒险已结束（车厢 ${sceneData.currentCar}/7）。可以继续对话回顾剧情，或「返回主页」开始新冒险。`, 'system');
    }, 600);
  }
}

function deleteSession(sessId) {
  if (!sessId || sessId === 'undefined') return;
  if (!confirm('删除这条对话记录？')) return;
  state.sessions = state.sessions.filter(s => s.id !== sessId);
  if (state.currentSessionId === sessId) state.currentSessionId = null;
  autoSave();
  showToast('🗑 已删除');
  // 强制重新渲染整个过往对话列表
  showSessionList();
}

function saveCurrentSession() {
  if (!state.currentSessionId) return;
  const sess = state.sessions.find(s => s.id === state.currentSessionId);
  if (!sess) return;
  // 从 DOM 抓取当前消息
  sess.messages = captureMessagesFromDOM();
  sess.sceneData = JSON.parse(JSON.stringify(state.sceneData));
  sess.lastPlayed = Date.now();
}

function enterPlay(restoreMessages) {
  state.currentView = 'play';
  document.getElementById('topbar-title').innerHTML = '🕯 COC 守秘人 <span>| 游戏中</span>';
  document.getElementById('home-area').style.display = 'none';
  document.getElementById('play-area').style.display = 'flex';
  document.getElementById('left-panel').style.display = '';  // 游戏时显示左栏
  document.getElementById('play-header').innerHTML = `
    <button class="home-btn" onclick="goHome()">🏠 主页</button>
    <span class="play-title">${SCENARIOS.find(s=>s.id===state.currentScenarioId)?.name||''} · ${state.investigator?.name||''}</span>
  `;
  // 清空聊天区
  document.getElementById('chat-messages').innerHTML = '';
  if (restoreMessages) {
    const sess = state.sessions.find(s => s.id === state.currentSessionId);

                   : `<div class="msg system">${nl2br(m.content)}</div>`;
        document.getElementById('chat-messages').innerHTML += html;
      }
      addMsg('system', '—— 已加载历史对话 ——');
    } else {

      addMsg('system', '=== 准备开始新冒险 ===');

function captureMessagesFromDOM() {
  // 从 addMsg 记录过的 raw 数据恢复更可靠，但目前只从 DOM 抓
  const arr = [];
  const els = document.querySelectorAll('#chat-messages > .msg, #chat-messages > .msg-system, #chat-messages > .msg-tip, #chat-messages > .msg-dice');
  els.forEach(el => {
    if (el.classList.contains('kp')) arr.push({type:'kp', content: el.innerText.replace(/^🕯 守秘人\s*/,'')});
    else if (el.classList.contains('player')) arr.push({type:'player', content: el.innerText});
    else if (el.classList.contains('dice')) arr.push({type:'dice', content: el.innerText.replace(/^🎲\s*/,'')});
    else if (el.classList.contains('tip')) {
      const label = el.querySelector('.tip-label')?.innerText || '';
      const body = el.innerText.replace(label, '').trim();
      arr.push({type:'tip', content: body, subtype: label.replace(/^💡\s*/,'')});
    } else arr.push({type:'system', content: el.innerText});
  });
  return arr;
}

function renderTutorialBar() {
  const bar = document.getElementById('tutorial-bar');
  const current = state.tutorialStep;
  bar.innerHTML = '<span class="t-label">📖 教程</span>' +
    TUTORIAL_STEPS.map((s,i) => {
      let cls = 't-step';
      if (s.done) cls += ' done';
      else if (i === current) cls += ' current';
      else cls += ' available';
      return `<span class="${cls}" onclick="openTutorial(${i})">${s.label}</span>`;
    }).join('') +
    '<span class="t-label" style="margin-left:auto">点击任意章节查看</span>';
}

function advanceTutorial() {
  if (state.tutorialDone) return;
  TUTORIAL_STEPS[state.tutorialStep].done = true;
  state.tutorialStep++;
  if (state.tutorialStep >= TUTORIAL_STEPS.length) {
    state.tutorialDone = true;
    addMsg('system', '✅ 新手教程全部完成！你已经了解了COC的基础玩法。准备好开始冒险了吗？点击「开始冒险」或直接描述你的行动。', 'system');
    renderTutorialBar();
    autoSave();
    return;
  }
  renderTutorialBar();
  autoSave();
  renderTutorialContent(state.tutorialStep);
}

function scrollToStep(step) {
  if (step <= state.tutorialStep || TUTORIAL_STEPS[step].done) {

  }
}

预计时长：30-60分钟
推荐技能：侦查、急救、话术、潜行

<b>背景（规则书第3章：调查员导入）</b>
2013年的某天，你加班到很晚，拖着疲惫的身躯赶上了今天的<b>末班电车</b>。
车厢里稀稀落落坐了几个乘客，你找了个座位坐下。
太累了。眼皮越来越沉，你陷入了沉睡...

不知过了多久——
你猛然惊醒。

车厢里<b>空无一人</b>。所有的乘客都消失了。窗外不是熟悉的街灯，而是<b>一片浓稠的黑暗</b>。电车仍在飞驰——但你清楚意识到，按时间计算早就该到终点站了。

你检查手机——<b>没有信号</b>。

车厢门上贴着一张<b>便签</b>：
「<i>只管前进吧，已经没有退路了</i>」

<b>你的目标</b>
你需要在这趟诡异的末班电车中探索，找到通往<b>车头驾驶室</b>的路，拉下<b>紧急制动闸</b>停车，然后逃出去。
但在你身后，有什么东西正在一节一节地吞噬车厢...

<b>准备开始</b>
✅ 创建好你的调查员（属性/技能/装备全部填写完整）
✅ 通过合规检查（系统会自动验证）
✅ 了解基础规则（D100/SAN/侦查）
✅ 告诉我「准备好了」

<b>记住三个原则：</b>
1. <b>说你想做什么</b>——我会告诉你怎么判定
2. <b>失败不是终点</b>——只是故事换了个方向
3. <b>保持理智</b>——SAN是你最重要的资源

🕯️ 祝你好运，调查员。但愿你能看见黎明。` }
  };
  const c = contents[step];
  if (!c) return;
  addMsg('rule', `<div class="rule-label">${c.title}</div>${c.body.replace(/\n/g,'<br>').replace(/【/g,'「').replace(/】/g,'」')}`, 'rule');
}

  if (idx < 0) state.investigators.push(JSON.parse(JSON.stringify(state.investigator)));

  addMsg('system', `📊 属性总评: ${Object.values(charData.attrs).reduce((a,b)=>a+b)}点 | HP:${hp} SAN:${sanVal} DB:${db} | 2013·东京`, 'system');

}

function quickGenerateChar() {
  const name = document.getElementById('qc-name').value.trim() || '无名调查员';
  const age = document.getElementById('qc-age').value || '25';
  const gender = document.getElementById('qc-gender').value;
  const appearance = document.getElementById('qc-appearance').value.trim();
  const bg = document.getElementById('qc-background').value.trim();
  const gearStr = document.getElementById('qc-gear').value.trim();

  // 留空快捷通道：所有字段全空时直接召唤当前台本的预设角色
  // 关键：必须根据玩家当前所在台本选对应预设，不能硬编码
  const rawName = document.getElementById('qc-name').value.trim();
  const rawAge = document.getElementById('qc-age').value.trim();
  const isAllEmpty = !rawName && !rawAge && !appearance && !bg && !gearStr;
  if (isAllEmpty) {
    // 关闭弹窗
    const modal = document.getElementById('quick-char-modal');
    if (modal) modal.remove();

    // 关键修复#3：游戏中禁止召唤预设角色（会破坏剧情一致性）
    const isInGame = state.currentView === 'play' && state.currentSessionId;
    if (isInGame) {
      showToast('⚠️ 正在游戏中，请先回主页再创建新调查员');
      addMsg('system', `⚠️ 当前正在剧情中，无法在游戏中创建新角色。请点击「返回主页」按钮，新建角色后再开始冒险。`, 'system');
      return;
    }

    // 找到当前台本的第一个预设（契合当前剧情）
    const currentScen = SCENARIOS.find(s => s.id === state.currentScenarioId);
    const preset = currentScen && currentScen.presets && currentScen.presets[0];

    if (preset && typeof window[preset.createFn] === 'function') {
      showToast(`⚡ 召唤「${preset.name}」...`);
      window[preset.createFn]();
      // 主页流程：createLimaiChar() 已不调 showReadyScreen()，此处补上
      showReadyScreen();
    } else {
      // 兜底：当前台本无预设 → 走普通智能生成（不 return，让后续流程接管）
      showToast('⚡ 当前台本无预设，继续生成自定义角色...');
    }
    return;
  }

  // 根据描述的关键词解析特征
  const lower = (bg + ' ' + appearance).toLowerCase();
  const isAthletic = /练|运动|健身|肌肉|体育|格斗|武术|散打|兵击|短棍|剑道|居合/.test(lower);
  const isStrong = /壮|力量|力大|重物/.test(lower) || isAthletic;
  const isDex = /敏捷|灵活|快|反射|迅捷|灵巧/.test(lower) || isAthletic;
  const isSmart = /学生|教授|研究|读书|博士|知识|学术/.test(lower);
  const isSocial = /健谈|社交|交际|酒保|销售|谈判|说服/.test(lower);
  const isObservant = /观察|敏锐|细心|侦探|记者|摄影/.test(lower);
  const isJapan = /日本|东京|留学/.test(lower);
  const isChina = /中国|上海|北京|广州/.test(lower);
  const hasWeapon = /棍|刀|剑|枪|匕/.test(lower);
  const isDoctor = /医生|护士|医/.test(lower);
  const isResearcher = /研究|实验|学者/.test(lower);

  // 分配属性 (基准50，根据关键词调整)
  const roll = () => Math.floor(Math.random() * 21 + 40); // 40-60随机基准
  const attrs = {
    str: Math.min(90, Math.max(15, (isStrong ? 70 : 50) + Math.floor(Math.random() * 10 - 5))),
    con: Math.min(90, Math.max(15, (isAthletic ? 65 : 50) + Math.floor(Math.random() * 10 - 5))),
    siz: Math.min(90, Math.max(40, 55 + Math.floor(Math.random() * 10 - 5))),
    dex: Math.min(90, Math.max(15, (isDex ? 70 : 50) + Math.floor(Math.random() * 10 - 5))),
    app: Math.min(90, Math.max(15, 50 + Math.floor(Math.random() * 10 - 5))),
    int: Math.min(90, Math.max(40, (isSmart ? 70 : 55) + Math.floor(Math.random() * 10 - 5))),
    pow: Math.min(90, Math.max(15, 55 + Math.floor(Math.random() * 10 - 5))),
    edu: Math.min(90, Math.max(40, (isSmart ? 65 : 50) + Math.floor(Math.random() * 10 - 5)))
  };

  // 选职业
  let occ = '学生';
  if (isDoctor) occ = '医生';
  else if (isResearcher) occ = '研究员';
  else if (isSocial && !isSmart) occ = '酒保';
  else if (isObservant && isJapan) occ = '记者';
  else if (isSmart && !isAthletic) occ = '教授';
  else if (isAthletic && hasWeapon) occ = '军人';
  else if (isAthletic) occ = '运动员/体力劳动者';

  // 生成技能
  const skills = {};
  const baseSkills = { '侦查':25,'聆听':20,'潜行':20,'图书馆使用':20,'话术':5,'说服':10,'心理学':10,'格斗(斗殴)':25,'闪避':Math.floor(attrs.dex/2),'急救':30,'攀爬':20,'投掷':20 };
  Object.entries(baseSkills).forEach(([k,v]) => { skills[k] = v; });

  // 根据背景加技能
  if (isAthletic) { skills['格斗(斗殴)'] = Math.max(60, skills['格斗(斗殴)']+20); skills['闪避'] = Math.max(50, skills['闪避']+10); skills['攀爬'] = 50; }
  if (isObservant) { skills['侦查'] = 60; skills['聆听'] = 50; }
  if (isSmart) { skills['图书馆使用'] = 60; skills['心理学'] = 50; skills['历史'] = 40; }
  if (isSocial) { skills['话术'] = 50; skills['说服'] = 50; skills['魅惑'] = 40; }
  if (isDoctor) { skills['急救'] = 60; skills['医学'] = 50; skills['精神分析'] = 30; }
  if (isResearcher) { skills['图书馆使用'] = 65; skills['科学'] = 50; skills['语言(其他)'] = 40; }
  if (isJapan) { skills['语言(其他)'] = Math.max(50, skills['语言(其他)']||0); }

  // 物品
  const inventory = ['手机','钱包','钥匙串'];
  if (gearStr) gearStr.split(/[,，、]/).forEach(i => { const t=i.trim(); if(t) inventory.push(t); });
  if (hasWeapon && !gearStr) inventory.push('随身武器');

  // 构建角色
  const hp = Math.floor((attrs.con + attrs.siz) / 10);
  const sanVal = attrs.pow;
  const sCon = attrs.str + attrs.siz;
  let db='0',build=0;
  if (sCon<=64){db='-2';build=-2;}else if(sCon<=84){db='-1';build=-1;}else if(sCon<=124){db='0';build=0;}else if(sCon<=164){db='+1D4';build=1;}else if(sCon<=204){db='+1D6';build=2;}else{db='+2D6';build=3;}

  state.investigator = {
    id: 'inv_' + Date.now() + '_' + Math.random().toString(36).slice(2,6),
    name, playerName:name, occ, era:'2013年', age, gender,
    residence: bg.match(/住在[^，。]+/)?.[0] || bg.match(/在[^的]+/)?.[0] || '未知',
    birthplace: bg.match(/上海|北京|广州|深圳|杭州|成都/)?.[0] || '中国',
    attrs, hp:{current:hp,max:hp}, mp:{current:Math.floor(sanVal/5),max:Math.floor(sanVal/5)},
    san:{current:sanVal,max:sanVal,init:sanVal}, luck:{current:roll3d6x5(),max:roll3d6x5()},
    db, build, mov:8, credit:15, skills, inventory, weapons:[],
    appearance, bg, beliefs:'', motto:'', connections:'', notes:'',
    _meta:{totalPoints:Object.values(attrs).reduce((a,b)=>a+b,0), rating:'自动生成', createdAt:new Date().toISOString(), version:'COC 7e'}
  };
  updateCharSheet();
  autoSave();
  document.getElementById('quick-char-modal').remove();

  addMsg('system', `⚡ 智能建卡完成——「${name}」${occ} ${age}岁`, 'system');
  addMsg('system', `📊 属性: STR${attrs.str} CON${attrs.con} DEX${attrs.dex} INT${attrs.int} | HP:${hp} SAN:${sanVal} DB:${db}`, 'system');
  addMsg('system', `⭐ 擅长: ${Object.entries(skills).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([k,v])=>`${k}${v}%`).join('、')}`, 'system');
  showToast(`✅ 已生成调查员「${name}」`);
  showReadyScreen();
}

/* 职业选择时显示详情 */
function onOccChange() {
  const occName = document.getElementById('cc-occ').value;
  const info = document.getElementById('occ-info');
  const occData = OCCUPATIONS.find(o => o.name === occName);
  if (occData) {
    info.innerHTML = formatOccInfo(occData);
    // 更新技能点计算
    const edu = parseInt(document.getElementById('cc-edu')?.value) || 50;
    const int = parseInt(document.getElementById('cc-int')?.value) || 50;
    const ptsMatch = occData.pts.match(/EDU×(\d+)/);
    const occPts = ptsMatch ? edu * parseInt(ptsMatch[1]) : edu * 4;
    const intPts = int * 2;
    document.getElementById('occ-pts-display').innerHTML = `<b>职业点数:</b> ${occData.pts}=${occPts}`;
    document.getElementById('int-pts-display').innerHTML = `<b>兴趣点数:</b> INT×2=${intPts}`;
  } else {
    info.innerHTML = '<span style="color:var(--text-muted)">选择职业后显示职业技能分配详情</span>';
  }
}
function formatOccInfo(o) {
  return `<b>${o.name} (${o.e})</b>
    <br>技能点数: ${o.pts} | 信用范围: ${o.credit}
    <br>本职技能: ${o.skills.join('、')}`;
}

/* 信用评级 → 财富 */

/* ==================== COC 7e 严格规则引擎 ==================== */

/**
 * COC 7e 核心投骰规则（严格按规则书）
 * 3D6×5 属性: STR, CON, DEX, APP, POW → 15-90
 * (2D6+6)×5 属性: SIZ, INT, EDU → 40-90
 */
function roll3d6x5() {
  const roll = Math.floor(Math.random()*6+1) + Math.floor(Math.random()*6+1) + Math.floor(Math.random()*6+1);
  return roll * 5;
}

function roll2d6plus6x5() {
  const roll = Math.floor(Math.random()*6+1) + Math.floor(Math.random()*6+1) + 6;
  return roll * 5;
}

function rollSingleAttr(key) {
  if (['siz','int','edu'].includes(key)) return roll2d6plus6x5();
  return roll3d6x5();
}

function rollAllAttrs() {
  const keys = ['str','con','siz','dex','app','int','pow','edu'];
  const attrs = {};
  keys.forEach(k => { attrs[k] = rollSingleAttr(k); });
  keys.forEach(k => {
    const el = document.getElementById('cc-'+k);
    if (el) el.value = attrs[k];
  });
  // 投骰动画闪烁效果
  keys.forEach((k,i) => {
    const el = document.getElementById('cc-'+k);
    if (el) {
      el.style.transition = 'background 0.2s';
      el.style.background = '#3a1a1a';
      setTimeout(() => { if (el) el.style.background = ''; }, 200 + i*60);
    }
  });
  updateAttrRating();
}

/**
 * 单项属性评级（严格按 COC 7e 规则书 p.32）
 */
function getSingleAttrRating(value) {
  if (value < 15) return { label: '低于最低值 ❌', desc: 'COC 7e规则书规定最低值不能低于15', cls: 'fumble' };
  if (value > 90) return { label: '超过最高值 ❌', desc: 'COC 7e规则书规定常规角色最高值不能超过90', cls: 'fumble' };
  if (value <= 24) return { label: '极低', desc: '远超常人下限，严重缺陷', cls: 'fail' };
  if (value <= 34) return { label: '低', desc: '低于常人平均水平', cls: 'fail' };
  if (value <= 44) return { label: '偏低', desc: '略低于平均值', cls: 'fail' };
  if (value <= 55) return { label: '普通', desc: '完全正常的平均水平', cls: 'success' };
  if (value <= 64) return { label: '偏高', desc: '略高于常人', cls: 'success' };
  if (value <= 74) return { label: '良好', desc: '明显高于平均水平', cls: 'hard' };
  if (value <= 84) return { label: '优秀', desc: '显著优秀的特质', cls: 'extreme' };
  return { label: '卓越', desc: '人类顶尖水平', cls: 'crit' };
}

/**
 * 角色总评（严格按 COC 7e 规则书标准）
 * 规则书 p.26 标准属性生成: 3D6×5 与 (2D6+6)×5
 * 数学期望总和: (5×52.5) + (3×65) = 262.5 + 195 = 457.5
 * 范围: 15×(5) + 40×(3) = 195 至 90×(8) = 720
 * 但合理随机范围约: 300-600
 */
function getTotalRating(attrs) {
  const vals = Object.values(attrs);
  const total = vals.reduce((a,b) => a+b, 0);
  const minVal = Math.min(...vals);
  const maxVal = Math.max(...vals);

  let issues = [];
  let illegal = [];
  let warnings = [];

  // 合规检查 1: 每个属性必须在 15-90 之间（规则书 p.32 硬性要求）
  Object.entries(attrs).forEach(([k,v]) => {
    if (v < 15) illegal.push(`${ATTR_NAMES[k]}(${v})低于规则书最低值15，不合法`);
    if (v > 90) illegal.push(`${ATTR_NAMES[k]}(${v})超过规则书最高值90，不合法`);
  });

  // 合规检查 2: 3D6×5 属性 (STR/CON/DEX/APP/POW) 必须是 5 的倍数且 3D6 范围
  ['str','con','dex','app','pow'].forEach(k => {
    const v = attrs[k];
    if (v % 5 !== 0) warnings.push(`${ATTR_NAMES[k]}(${v})不是5的倍数，可能不是由标准3D6×5生成`);
    if (v > 0 && v < 15) illegal.push(`${ATTR_NAMES[k]}(${v})作为3D6×5属性，最低值应为15 (3×1×5=15)`);
    if (v > 90) illegal.push(`${ATTR_NAMES[k]}(${v})作为3D6×5属性，最高值应为90 (3×6×5=90)`);
  });

  // 合规检查 3: (2D6+6)×5 属性 (SIZ/INT/EDU)
  ['siz','int','edu'].forEach(k => {
    const v = attrs[k];
    if (v % 5 !== 0) warnings.push(`${ATTR_NAMES[k]}(${v})不是5的倍数，可能不是由标准(2D6+6)×5生成`);
    if (v > 0 && v < 40) warnings.push(`${ATTR_NAMES[k]}(${v})作为骰点属性，通常不低于40`);
    if (v > 90) illegal.push(`${ATTR_NAMES[k]}(${v})作为(2D6+6)×5属性，最高值应为90`);
  });

  // 合规检查 4: 总点数合理范围（规则书基于骰点的期望值）
  if (total < 300) warnings.push(`总点数${total}低于典型骰点范围下界(约300)，角色可能过弱`);
  if (total > 600) warnings.push(`总点数${total}超过典型骰点范围上界(约600)，检查是否为合法的极端骰运`);
  if (total < 200) illegal.push(`总点数${total}远低于规则书合理范围，无法创建合法调查员`);

  // 合规检查 5: 是否有属性过低导致角色无法正常扮演
  if (attrs.str < 20 && attrs.con < 20) warnings.push('力量和体质均极低，角色可能体弱多病影响正常行动');
  if (attrs.int < 30) warnings.push(`智力${attrs.int}低于30，角色心智严重受限，调查类行动会极其困难`);

  // 评分
  const expected = 457.5; // COC 7e 规则书理论期望值
  const ratio = total / expected;
  let rating, ratingClass, color;
  if (illegal.length > 0) {
    rating = '不合规 ❌';
    ratingClass = 'fumble';
    color = 'var(--crimson-light)';
  } else if (total < 350) {
    rating = '偏弱 — 挑战高 ⚠️';
    ratingClass = 'fail';
    color = '#c0392b';
  } else if (total < 410) {
    rating = '略低于平均';
    ratingClass = 'fail';
    color = '#d35400';
  } else if (total < 460) {
    rating = '标准调查员 ✅';
    ratingClass = 'success';
    color = '#27ae60';
  } else if (total < 510) {
    rating = '较强 💪';
    ratingClass = 'hard';
    color = '#2e86c1';
  } else if (total < 560) {
    rating = '精英 ⭐';
    ratingClass = 'extreme';
    color = '#8e44ad';
  } else {
    rating = '天选之人 🔥';
    ratingClass = 'crit';
    color = '#c9a94e';
  }

  return { total, rating, ratingClass, color, ratio, illegal, warnings, issues, minVal, maxVal };
}

function updateAttrRating() {
  const attrs = {};
  ['str','con','siz','dex','app','int','pow','edu'].forEach(a => {
    const el = document.getElementById('cc-'+a);
    attrs[a] = parseInt(el ? el.value : 0) || 0;
  });
  const vals = Object.values(attrs);
  if (vals.every(v => v === 0)) {
    document.getElementById('attr-rating').style.display = 'none';
    document.getElementById('attr-validation').textContent = '💡 点击「随机投骰全部」按规则书骰点生成属性，或手动输入 15-90 之间的数值';
    return;
  }
  const rating = getTotalRating(attrs);
  const el = document.getElementById('attr-rating');
  el.style.display = 'block';

  let bgColor;
  if (rating.ratingClass === 'crit') bgColor = '#1a1a0a';
  else if (rating.ratingClass === 'extreme') bgColor = '#0a0a1a';
  else if (rating.ratingClass === 'hard') bgColor = '#0a1a0a';
  else if (rating.ratingClass === 'success') bgColor = '#0a140a';
  else if (rating.ratingClass === 'fail') bgColor = '#1a0a0a';
  else bgColor = '#1a0a0a';
  el.style.background = bgColor;
  el.style.border = '1px solid ' + rating.color;

  const pct = Math.round(rating.ratio * 100);
  const rt = document.getElementById('rating-text') || document.getElementById('attr-rating');
  if (rt) rt.innerHTML =
    `<b style="color:${rating.color}">总属性: ${rating.total} 点</b> (期望: ~457) — ${rating.rating}
     <br><span style="color:var(--text-muted);font-size:10px">相对强度: ${pct}% | 最低: ${rating.minVal} | 最高: ${rating.maxVal}</span>`;

  // 合规性验证结果
  const validation = document.getElementById('attr-validation');
  let msgs = [];
  if (rating.illegal.length > 0) {
    msgs.push(`<b style="color:var(--crimson-light)">❌ 违反规则书: ${rating.illegal.join('; ')}</b>`);
  }
  if (rating.warnings.length > 0) {
    rating.warnings.forEach(w => msgs.push(`<span style="color:var(--gold-light)">⚠️ ${w}</span>`));
  }
  if (msgs.length === 0) {
    msgs.push(`<span style="color:var(--green-light)">✅ 符合COC 7e规则书标准，可以创建</span>`);
  }
  validation.innerHTML = msgs.join('<br>');
}

function saveChar() {
  // ---- 严格合规检查 ----
  const get = id => parseInt(document.getElementById(id).value) || 0;
  const attrs = {};
  ['str','con','siz','dex','app','int','pow','edu'].forEach(a => {
    let v = get('cc-'+a);
    if (v === 0) v = rollSingleAttr(a);
    attrs[a] = Math.max(0, v);
  });

  const rating = getTotalRating(attrs);

  // 规则书硬性拦截: 存在不合法属性值 → 阻止保存
  if (rating.illegal.length > 0) {
    addMsg('system', `<b style="color:var(--crimson-light)">❌ 角色创建被拒绝</b><br>规则书检查失败:<br>${rating.illegal.join('<br>')}<br><br>请调整属性再试。`, 'system');
    showToast('违反规则书，无法创建');
    return;
  }

  // 存在警告时询问是否确认
  if (rating.warnings.length > 0) {
    const warnMsg = rating.warnings.join('\n');
    if (!confirm(`⚠️ 以下事项需要注意:\n\n${warnMsg}\n\n是否确认创建？\n(你可以选择取消后调整属性)`)) {
      return;
    }
  }

  // ---- 合规通过，正式创建 ----
  ['str','con','siz','dex','app','int','pow','edu'].forEach(a => {
    if (attrs[a] < 15) attrs[a] = 15;
    if (attrs[a] > 90) attrs[a] = 90;
  });

  // 衍生值计算（严格按COC 7e官方规则书 p.7-8）
  // HP = (CON + SIZ) / 10，向下取整
  const hp = Math.floor((attrs.con + attrs.siz) / 10);
  // SAN起始值 = POW
  const sanVal = attrs.pow;
  // 幸运 = 3D6×5（独立投骰，与POW无关！）
  const luckVal = roll3d6x5();

  // 伤害加值DB与体格Build（官方规则书 p.8 表格）
  const strCon = attrs.str + attrs.siz;
  let db = '0', build = 0;
  if (strCon <= 64) { db = '-2'; build = -2; }
  else if (strCon <= 84) { db = '-1'; build = -1; }
  else if (strCon <= 124) { db = '0'; build = 0; }
  else if (strCon <= 164) { db = '+1D4'; build = 1; }
  else if (strCon <= 204) { db = '+1D6'; build = 2; }
  else { db = '+2D6'; build = 3; } // 扩展表（完整版规则书）

  const occ = document.getElementById('cc-occ').value;
  const eduVal = attrs.edu;
  const intVal = attrs.int;
  const skillPoints = eduVal * 4 + intVal * 2;

  // 收集技能值
  const skills = {};
  SKILL_LIST.forEach(s => {
    const el = document.getElementById('sk-'+s.name);
    skills[s.name] = el ? parseInt(el.value) || s.base : s.base;
  });

  // 收集物品
  const itemsStr = document.getElementById('cc-items').value;
  const inventory = itemsStr ? itemsStr.split('\n').map(i=>i.trim()).filter(i=>i) : ['手机','钱包','钥匙串'];

  const credit = parseInt(document.getElementById('cc-credit').value) || 0;

  state.investigator = {
    id: 'inv_' + Date.now() + '_' + Math.random().toString(36).slice(2,6),
    name: document.getElementById('cc-name').value.trim() || '无名调查员',
    playerName: document.getElementById('cc-player').value.trim(),
    occ: occ,
    era: document.getElementById('cc-era').value,
    age: document.getElementById('cc-age').value,
    gender: document.getElementById('cc-gender').value,
    residence: document.getElementById('cc-residence').value,
    birthplace: document.getElementById('cc-birthplace').value,
    attrs: attrs,
    hp: { current: hp, max: hp },
    mp: { current: Math.floor(sanVal/5), max: Math.floor(sanVal/5) },
    san: { current: sanVal, max: sanVal, init: sanVal },
    luck: { current: luckVal, max: luckVal },
    db: db, build: build, mov: 8,
    skills: skills,
    credit: credit,
    skillPoints: skillPoints,
    inventory: inventory,
    weapons: [],
    appearance: document.getElementById('cc-appearance').value.trim(),
    beliefs: document.getElementById('cc-beliefs').value.trim(),
    motto: document.getElementById('cc-motto').value.trim(),
    bg: document.getElementById('cc-bg').value.trim(),
    connections: document.getElementById('cc-connections').value.trim(),
    notes: '',
    _meta: {
      totalPoints: rating.total,
      rating: rating.rating,
      createdAt: new Date().toISOString(),
      version: 'COC 7e'
    }
  };

  document.getElementById('char-modal').remove();
  updateCharSheet();
  autoSave();
  // 推入 investigators
  if (state.investigator && state.investigator.id) {
    const idx = state.investigators.findIndex(i => i.id === state.investigator.id);
    if (idx < 0) state.investigators.push(JSON.parse(JSON.stringify(state.investigator)));
  }
  addMsg('system', `🎭 调查员「${state.investigator.name}」创建完成！`, 'system');
  addMsg('system', `📊 属性总评: ${rating.total}点 | ${rating.rating} | 期望值约457点`, 'system');
  showToast(`✅ 「${state.investigator.name}」创建成功！点击「开始冒险」或输入「准备好了」`);
  advanceTutorial();
  showReadyScreen();
}

// ==================== COMBAT/DICE HELPERS ====================
function d100() { return Math.floor(Math.random() * 100) + 1; }

// 解析骰子公式，例如 "1D6"、"2D3"、"5"
function parseDiceFormula(formula) {
  if (!formula) return 0;
  formula = String(formula).trim().toUpperCase().replace(/\s/g, '');
  // 纯数字
  if (/^\d+$/.test(formula)) return parseInt(formula);
  // nDs 格式
  const m = formula.match(/^(\d*)D(\d+)$/);
  if (m) {
    const n = parseInt(m[1]) || 1, s = parseInt(m[2]);
    return diceRoll(s, n).total;
  }
  return 0;
}

function diceRoll(sides, count) {
  count = count || 1;
  let total = 0;
  let rolls = [];
  for (let i=0; i<count; i++) {
    const r = Math.floor(Math.random() * sides) + 1;
    rolls.push(r);
    total += r;
  }
  return { total, rolls, str: count === 1 ? `1d${sides}=${total}` : `${count}d${sides}=[${rolls.join(',')}]=${total}` };
}

function skillCheck(skillName, skillValue) {
  const roll = d100();
  let level = 'fail';
  if (roll === 1) level = 'crit';
  else if (roll >= 96 && skillValue < 50) level = 'fumble';
  else if (roll >= 100) level = 'fumble';
  else if (roll <= Math.floor(skillValue / 5)) level = 'extreme';
  else if (roll <= Math.floor(skillValue / 2)) level = 'hard';
  else if (roll <= skillValue) level = 'success';
  else if (roll >= 96) level = 'fumble';
  return { roll, level, skillValue };
}

function formatCheckResult(res, skillName) {
  const levelNames = {
    crit: '🔥 大成功！',
    extreme: '💫 极难成功！',
    hard: '⭐ 困难成功！',
    success: '✅ 成功',
    fail: '❌ 失败',
    fumble: '💀 大失败！'
  };
  const colors = {
    crit: 'crit', extreme: 'extreme', hard: 'hard', success: 'success', fail: 'fail', fumble: 'fumble'
  };
  return {
    text: `${skillName}检定: d100=${res.roll} / ${res.skillValue}%`,
    result: levelNames[res.level],
    cls: colors[res.level]
  };
}

function simpleRoll(name, sides) {
  if (name === 'SAN检定' || sides === 0) { sanCheck(1); return; }
  if (sides === '%') { d100Roll('d100'); return; }
  if (sides === '🌀') { sanCheck(1); return; }
  const r = diceRoll(typeof sides === 'number' && sides > 0 ? sides : 100);
  addMsg('dice', `${name}: ${r.str}`);
}

function d100Roll(label) {
  const r = d100();
  addMsg('dice', `D100: ${r}`);
}

function skillRoll(skill) {
  if (!state.investigator) { addMsg('system', '请先创建调查员'); return; }
  const val = state.investigator.skills[skill] || getBaseSkill(skill);
  const res = skillCheck(skill, val);
  const fmt = formatCheckResult(res, skill);
  addMsg('dice', `${fmt.text} → ${fmt.result}`);
  return res;
}

function getBaseSkill(name) {
  const found = SKILL_LIST.find(s => s.name === name);
  return found ? found.base : 5;
}

function sanCheck(difficulty) {
  if (!state.investigator) { addMsg('system', '请先创建调查员'); return; }

  addMsg('dice', `${fmt.text} → ${fmt.result}`);
  return res;
}

      startScenario();
    } else {
      addMsg('kp', `在你开始之前，建议先完成新手教程。点击顶部的「COC新手教程」浏览规则，或者直接告诉我「我准备好了」开始冒险。`);
    }
    return;
  }
  // 关键修复#8：'ended' 阶段允许继续输入（剧情回顾/反应），不阻断
  if (state.gamePhase === 'ended') {
    addMsg('system', `📜 该冒险已结束。如需重玩，请「返回主页」开始新冒险。`, 'system');
    return;
  }

  // 模组分派：常暗之厢的 7 节车厢逻辑
  if (state.currentScenarioId === 'chang-an') {
    return runChangAn(text);
  }
  // 兜底：未识别模组
  addMsg('kp', `（当前模组「${state.currentScenarioId||'未知'}」剧情尚未实现）`);
}

/* ==================== 常暗之厢 剧情 ==================== */
function runChangAn(text) {
  const sd = state.sceneData;
  const c = state.investigator;
  const lower = text.toLowerCase();
  // 关键修复#5：精确的「去往前/回去」判断，避免「我有3件物品」「七七八八」等误触
  const goForward = /^(?:我)?(?:继续)?(?:前|往[前后]|去[前后]|到|进[入]?)(?:下[一节]?)?(?:节)?(?:车[厢])?|^前|^去|^下一|^往前|^往[前后]|^进/.test(lower) ||
    /前往|去下一|往前走|往前|去前|下一节|下一车/.test(lower);
  const goBack = /回去|返回|后退|往后|回到|回[1-7]号/.test(lower);

  // --- SCENE: CAR 1 - Empty Car ---
  if (sd.currentCar === 1) {
    if (lower.includes('便签') || lower.includes('纸条') || lower.includes('翻') || lower.includes('看背面') || lower.includes('看便签')) {
      addMsg('kp', `你仔细看了看那张便签。正面只有那句话。你把它翻过来，背面用浅色字迹写着——「第三个箱子里有藏着钥匙」。这里的"箱子"指的是车厢编号。也就是说，从车头数第三节车厢里放着什么东西。`);
      sd.currentCar = 1;
      return;
    }
    if (lower.includes('侦查') || lower.includes('搜索') || lower.includes('调查') || lower.includes('检查')) {
      const res = skillRoll('侦查');
      addMsg('kp', `你对当前车厢进行了搜索。这是一节普通的乘客车厢，座位排列整齐。你在座位下方的缝隙里找到了半包烟和一枚1元硬币。车门旁边贴着电车路线图——你注意到靠车尾方向的后几节车厢被人故意涂黑了，看不清楚。`);
      return;
    }
    if (lower.includes('聆听') || lower.includes('听')) {
      const res = skillRoll('聆听');
      addMsg('kp', `你侧耳倾听。除了电车行驶的咔嗒声之外，你似乎听到了从远处——大概是车尾方向——传来了一些...声响。像是有什么沉重的东西在拖行。吱呀——嘎——节奏很慢，但越来越清晰。`);
      return;
    }
    if (goForward) {
      addMsg('kp', `你深吸一口气，推开车厢连接处的门，进入了下一节车厢。这里比前一节稍微破旧一些，座位上有几份散落的报纸，天花板上的灯忽明忽暗。列车继续在黑暗中飞驰。`);
      sd.currentCar = 2;
      sd.monsterDistance = Math.max(6, sd.monsterDistance - 1);
      advanceMonster();
      // 教程自动浮现：D100检定
      setTimeout(() => {
        addMsg('system', '💡 检定提示：尝试「搜索/侦查」会触发D100检定。骰出 ≤ 技能值 = 成功，01 = 大成功，96-00 = 大失败。');
      }, 1200);
      return;
    }
    if (lower.includes('物品') || lower.includes('手机') || lower.includes('包')) {
      addMsg('kp', `你检查了自己的随身物品：手机（无信号，但手电筒功能可用）、钱包（证件和少量现金还在）、钥匙串。你的幸运让你保留了所有重要物品。`);
      return;
    }
  }

  // --- CAR 2 ---
  if (sd.currentCar === 2) {
    if (lower.includes('报纸') || lower.includes('读报') || lower.includes('看报') || lower.includes('看报纸')) {
      addMsg('kp', `你捡起散落的报纸。日期是今天，但标题让你背脊发凉——<i>「末班电车连续失踪事件，警方调查陷入僵局」</i>。报道上说，最近一周已有5人在乘坐这趟线路的末班车后下落不明。你的心跳加快了一些。SAN 0/1`);
      if (d100() <= c.san.current) {
        addMsg('system', 'SAN检定成功，未损失理智值');
      } else {
        c.san.current = Math.max(0, c.san.current - 1);
        addMsg('system', `SAN检定失败，SAN -1（当前${c.san.current}/${c.san.max}）`);
        updateCharSheet();
      }
      return;
    }
    if (lower.includes('灯') || lower.includes('闪')) {
      addMsg('kp', `天花板的灯管闪烁不定，发出轻微的嗡嗡声。你抬头仔细看了看，发现其中一根灯管上缠着一根细细的铜线——看起来像是有人故意弄坏了电路。`);
      return;
    }
    if (lower.includes('侦查') || lower.includes('搜索')) {
      const res = skillRoll('侦查');
      if (res.level === 'success' || res.level === 'hard' || res.level === 'extreme' || res.level === 'crit') {
        addMsg('kp', `你在座位夹缝里发现了一个小巧的<b>手电筒</b>。试了试，还能亮。这在这片漆黑中会很有用。\n\n获得物品：手电筒`);
        sd.hasFlashlight = true;
        c.inventory.push('手电筒');
        updateCharSheet();
      } else if (res.level === 'fumble') {
        const newHp = Math.max(0, c.hp.current - 1);
        addMsg('kp', `你不小心被一张翘起的地毯绊了一下，膝盖撞到了座椅上。——1点伤害。\n\nHP -1（当前${newHp}/${c.hp.max}）`);
        c.hp.current = Math.max(0, c.hp.current - 1);
        updateCharSheet();
      } else {
        addMsg('kp', `车厢里看起来很正常。没有发现特别的东西。`);
      }
      return;
    }
    if (goForward || /前往3|去3|去三|找钥匙|去拿钥匙/.test(lower)) {
      addMsg('kp', `你继续向前，推开车厢连接处的门。门的另一边有股奇怪的气味扑面而来——像是铁锈和什么腐烂的东西混在一起。这节车厢明显比刚才的凌乱得多，到处散落着行李。`);
      sd.currentCar = 3;
      sd.monsterDistance = Math.max(5, sd.monsterDistance - 2);
      advanceMonster();
      return;
    }
    if (goBack) {
      addMsg('kp', `你回头看了一眼刚才来的方向。那边的灯光已经完全熄灭了，一片漆黑。而且...你好像听到了什么。一种沉闷的、持续的碾压声。就在那边。`);
      return;
    }
  }

  // --- CAR 3 - Key Car ---
  if (sd.currentCar === 3) {
    if (lower.includes('钥匙') || lower.includes('找') || lower.includes('搜索') || lower.includes('侦查') || lower.includes('找钥匙')) {
      const res = skillRoll('侦查');
      if (res.level === 'success' || res.level === 'hard' || res.level === 'extreme' || res.level === 'crit') {
        addMsg('kp', `你在3号车厢的行李架角落找到了一个用布包裹的小盒子。打开一看——里面是一把<b>陈旧的黄铜钥匙</b>。钥匙上刻着一行小字：「车长室」。\n\n获得物品：黄铜钥匙`);
        sd.hasKey = true;
        c.inventory.push('黄铜钥匙');
        updateCharSheet();
      } else {
        addMsg('kp', `你在3号车厢搜索了一遍，但这里很凌乱，暂时没发现什么。也许需要更仔细地检查——或者换个角度看看？`);
      }
      return;
    }
    if (lower.includes('气味') || lower.includes('味道') || lower.includes('铁锈')) {
      addMsg('kp', `你循着气味看去，发现车厢角落的地板上有一滩暗色的污渍。看起来像是什么液体...你不太确定那是什么，也不想碰它。`);
      return;
    }
    if (goForward || /前往4|去4|去四/.test(lower)) {
      addMsg('kp', `你穿过3号车厢，走向4号。这里的灯光更暗了，只有紧急出口的绿光在闪烁。你注意到4号车厢的连接门——上锁了。需要一把钥匙。`);
      return;
    }
  }

  // --- CAR 4 - Conductors Car ---
  if (sd.currentCar === 4) {
    // 关键修复#6：仅在 conductorAwake=false 且有钥匙时开门；开门后不重复触发
    if (!sd.conductorAwake && sd.hasKey && (lower.includes('开') || lower.includes('钥匙') || lower.includes('开门') || lower.includes('用钥匙'))) {
      addMsg('kp', `你用黄铜钥匙打开了通往4号车厢的门。门锁咔哒一声弹开。\n\n4号车厢是一节乘务员车厢。这里堆放着一些工具和杂物。一个穿着制服的<b>乘务员</b>蜷缩在角落里，听到声音猛地抬起头来。\n\n"你...你是活人？"他声音颤抖。他的腿上有一道触目惊心的伤口，被用撕碎的衬衫布条草草包扎着。`);
      sd.conductorAwake = true;
      registerNPC('conductor', '乘务员·京山人吉', {
        age:'30代', gender:'男', appearance:'穿JR制服的男性，30岁左右，瘦高，脸色苍白。右腿上有严重的咬伤，用撕碎的衬衫布条包扎着。眼神慌乱但不失善意。',
        relation:'neutral',
        info:['列车被怪物袭击','车头有紧急制动闸','他有两把钥匙但弄丢了一把']
      });
      return;
    }
    if (sd.conductorAwake) {
      if (lower.includes('问') || lower.includes('怎么') || lower.includes('发生') || lower.includes('交涉') || lower.includes('话术') || lower.includes('聊')) {
        addMsg('kp', `乘务员脸色苍白地说：\n\n"我们...遇到了怪物。不是人。它从后面车厢开始...一个一个地吞噬乘客。我跑的时候摔倒了，被它抓了一下。我把其他车厢的门都锁了，想着至少能让它慢一点..."\n\n他顿了顿："车头有紧急制动。如果能到那里，拉下闸就能停车。但前面的路...我得警告你，越靠近车头越危险。"`);
        addMsg('tip', '你了解到：①车头有紧急制动 ②怪物从车尾来 ③越往前越接近车头——但也意味着往车尾方向是怪物', '情报');
        updateNPCInfo('conductor', 'info', '知道车头有紧急制动闸');
        updateNPCInfo('conductor', 'info', '被怪物咬伤了腿');
        return;
      }
      if (lower.includes('治疗') || lower.includes('急救') || lower.includes('包扎')) {
        const res = skillRoll('急救');
        if (res.level === 'success' || res.level === 'hard' || res.level === 'extreme' || res.level === 'crit') {
          addMsg('kp', `你帮乘务员重新处理了伤口。他感激地看着你："谢谢...前面5号车厢的工具箱里应该有<b>撬棍</b>，你拿去吧，也许用得上。"\n\n乘务员好感度提升。获得情报：5号车厢有撬棍。`);
          addMsg('tip', '乘务员说你是个好人。他提到5号车厢有撬棍。', '情报');
          sd.hasCrowbar = true;
        } else {
          addMsg('kp', `你尝试给他包扎，但你的急救技能还不够熟练。虽然止血了，但走路还是很困难。他勉强笑了笑："没事，你快走吧...那东西越来越近了。"`);
        }
        return;
      }
      if (goForward || /前往5|去5|去五/.test(lower)) {
        addMsg('kp', `你告别乘务员，继续前进。他叫住你："小心！前面..."他的声音消失在门后。\n\n5号车厢被杂物堵塞了。你需要清理出一条路来。`);
        sd.currentCar = 5;
        sd.monsterDistance = Math.max(3, sd.monsterDistance - 2);
        advanceMonster();
        return;
      }
    } else {
      if (lower.includes('钥匙') || lower.includes('开')) {
        addMsg('kp', `门锁着。你需要一把钥匙才能打开通往4号车厢的门。还记得便签背面的话吗？「第三个箱子里有藏着钥匙」`);
        return;
      }
    }
  }

  // --- CAR 5 - Blocked ---
  if (sd.currentCar === 5) {
    if ((lower.includes('撬棍') || lower.includes('撬') || lower.includes('搬')) && sd.hasCrowbar) {
      addMsg('kp', `你用撬棍撬开了堵塞通道的杂物。箱子、货架被清出一条路来。穿过5号车厢，你来到了6号车厢——这里已经是靠近车头的位置了。\n\n前方就是7号车厢——也是路线图上被涂黑的部分。车头的门近在咫尺。`);
      sd.currentCar = 6;
      sd.monsterDistance = Math.max(2, sd.monsterDistance - 1);
      advanceMonster();
      return;
    }
    if (lower.includes('工具箱') || lower.includes('工具') || lower.includes('搜') || lower.includes('找')) {
      addMsg('kp', `你在杂物中找到了一根生锈的<b>撬棍</b>。虽然沉了点，但用来撬门或者防身应该没问题。\n\n获得物品：撬棍`);
      sd.hasCrowbar = true;
      if (!c.inventory.includes('撬棍')) c.inventory.push('撬棍');
      updateCharSheet();
      return;
    }
    if (lower.includes('清理') || lower.includes('搬') || lower.includes('推')) {
      if (sd.hasCrowbar) {
        addMsg('kp', `你用撬棍和双手清理出一条路来。`);
        sd.currentCar = 6;
        sd.monsterDistance = Math.max(2, sd.monsterDistance - 1);
        advanceMonster();
        return;
      }
      addMsg('kp', `你徒手开始搬动杂物。很吃力，但也不是完全不行。你看到角落里有一个工具箱，也许里面会有能帮上忙的东西。`);
      return;
    }
  }

  // --- CAR 6 - Final Stretch ---
  if (sd.currentCar === 6) {
    if (lower.includes('前') || lower.includes('7') || lower.includes('七') || lower.includes('车头') || lower.includes('制动') || lower.includes('闸')) {
      addMsg('kp', `你推开通往7号车厢的门。\n\n这里的灯光已经完全熄灭，只有紧急出口的微光。空气中有浓重的血腥味。你看到——在黑暗中，有什么巨大的东西在那里。它填满了整个车厢的后半部分，像是一堵由血肉、钢铁和黑暗混合而成的墙壁，微微蠕动着。\n\n而在你的前方3米处，就是驾驶室的门。紧急制动闸就在里面。\n\n那东西察觉到了你的存在。整个车厢震颤起来。`);
      sd.currentCar = 7;
      return;
    }
  }

  // --- CAR 7 - Finale ---
  if (sd.currentCar === 7) {
    if (lower.includes('跑') || lower.includes('冲') || lower.includes('开门') || lower.includes('制动') || lower.includes('拉') || lower.includes('闸')) {
      addMsg('kp', `你爆发出了全部的力量，冲向驾驶室的门！\n\n身后传来震耳欲聋的怒吼，那东西动了！\n\n...`);
      const finalRes = skillRoll('闪避') || skillRoll('DEX') || { roll: Math.floor(Math.random()*100)+1 };
      if (finalRes.roll <= 50) {
        addMsg('kp', `<i>你的手抓住了驾驶室的门把手。你用力拉开，冲进去，看到了那个红色手柄——紧急制动闸。</i>\n\n<i>你拉下了它。</i>\n\n<i>刺耳的金属摩擦声。火花。震动。列车剧烈减速——然后停了下来。</i>\n\n<i>窗外，是城市的灯光。你做到了。你还活着。</i>\n\n<b>🏆 结局：重见黎明</b>\n\n你从常暗之厢中逃了出来。但在你的记忆中，那个蠕动的巨大阴影、消失的乘客、乘务员的伤口——这一切永远挥之不去。SAN -1D6`);
        c.san.current = Math.max(0, c.san.current - Math.floor(Math.random()*6+1));
        updateCharSheet();
        state.gamePhase = 'ended';
        addMsg('system', `游戏结束。最终SAN: ${c.san.current}/${c.san.max}`);
        addMsg('kp', `感谢你游玩「常暗之厢」！你的冒险就此结束——或者，这只是你的调查员生涯的开始？`);
      } else {
        addMsg('kp', `<i>你迟了一秒。</i>\n\n<i>那东西追上了你。黑暗将你吞没。你最后听到的，是列车在永恒的黑暗中的轰鸣声...</i>\n\n<b>💀 结局：葬身黑暗</b>\n\n调查员「${c.name}」在常暗之厢中失踪。列车的终点站，从未有人到达过。`);
        state.gamePhase = 'ended';
      }
      return;
    }
    if (lower.includes('战斗') || lower.includes('打') || lower.includes('攻击')) {
      addMsg('kp', `面对那个东西，你的人类武器显得如此无力。但你还是举起手来...转头就跑可能是更好的选择。`);
      return;
    }
  }

  // Default response for unrecognized actions
  const fallbacks = [
    `你想做什么？你可以：①侦查当前车厢 ②前往其他车厢 ③检查物品 ④与遇到的NPC交谈 ⑤使用特定物品`,
    `注意目的一：找到通往车头的路。目的二：在怪物追上来之前拉下紧急制动。`,
    `记住便签上的话：「只管前进吧，已经没有退路了」。你的目标是车头的驾驶室。`,
    `你能听到后面传来越来越大、越来越近的声响。时间不多了。`
  ];
  addMsg('kp', fallbacks[Math.floor(Math.random() * fallbacks.length)]);
}

function advanceMonster() {
  const dist = state.sceneData.monsterDistance;
  if (dist <= 2) {
    addMsg('tip', '⚠️ 那东西越来越近了！你感觉到车厢在震颤，空气中的铁锈味越来越浓。必须加快速度！', '危险警告');
  } else if (dist <= 4) {
    addMsg('system', '你隐约听到远处的车厢传来金属扭曲的声音...', 'system');
  }
}

// ==================== RIGHT PANEL ====================
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.querySelector(`.tab-btn[onclick="switchTab('${tab}')"]`).classList.add('active');
  document.getElementById('tab-'+tab).classList.add('active');
}

async function testAPIConnection() {
  const endpoint = document.getElementById('set-endpoint').value.trim();
  const key = document.getElementById('set-key').value.trim();
  const model = document.getElementById('set-model').value;
  const btn = document.getElementById('api-test-btn');
  const result = document.getElementById('api-test-result');

  if (!endpoint || !key) {
    result.style.display = 'block';
    result.style.background = '#1a0a0a';
    result.style.border = '1px solid var(--crimson-light)';
    result.innerHTML = '❌ 请先填写API端点与密钥';
    return;
  }

  btn.textContent = '⏳ 测试中...';
  btn.disabled = true;
  result.style.display = 'none';

  try {
    const response = await fetch(endpoint, {
      method: 'POST',
      headers: { 'Content-Type':'application/json', 'Authorization':'Bearer '+key },
      body: JSON.stringify({
        model: model,
        messages: [{role:'user', content:'Respond with ONLY the word: OK'}],
        max_tokens: 10
      })
    });

    btn.textContent = '🔌 测试连接';
    btn.disabled = false;
    result.style.display = 'block';

    if (response.ok) {
      const data = await response.json();
      const reply = data?.choices?.[0]?.message?.content || '';
      if (reply.trim().toLowerCase().includes('ok')) {
        result.style.background = '#0a1a0a';
        result.style.border = '1px solid var(--green-light)';
        result.innerHTML = '✅ 连接成功！API工作正常 ✓<br><span style="color:var(--text-muted);font-size:10px">模型回复: '+reply.trim()+'</span>';
        showToast('✅ API连接测试通过');
      } else {
        result.style.background = '#1a1a0a';
        result.style.border = '1px solid var(--gold)';
        result.innerHTML = '⚠️ 连接成功但回复异常: '+reply.trim().substring(0,50);
      }
    } else {
      const errText = await response.text().catch(()=>'');
      let msg = '';
      if (response.status === 401) msg = '❌ 认证失败：API密钥无效';
      else if (response.status === 404) msg = '❌ 未找到：请检查API端点或模型名';
      else if (response.status === 429) msg = '❌ 请求超限：请稍后再试';
      else if (response.status === 400) msg = '❌ 请求格式错误：'+errText.substring(0,80);
      else msg = `❌ HTTP ${response.status}`;
      result.style.background = '#1a0a0a';
      result.style.border = '1px solid var(--crimson-light)';
      result.innerHTML = msg;
    }
  } catch(e) {
    btn.textContent = '🔌 测试连接';
    btn.disabled = false;
    result.style.display = 'block';
    result.style.background = '#1a0a0a';
    result.style.border = '1px solid var(--crimson-light)';
    result.innerHTML = '❌ 连接失败：'+e.message+'<br><span style="font-size:10px;color:var(--text-muted)">请检查端点地址和网络</span>';
  }
}

function getSystemPrompt() {
  const c = state.investigator;
  if (!c) return 'You are a Keeper of Arcane Lore for Call of Cthulhu 7th edition. Strictly follow the scenario script. Do not improvise new plot points.';
  const items = (c.inventory||[]).join(', ');
  const skills = c.skills ? Object.entries(c.skills).map(([k,v])=>`${k} ${v}%`).join(', ') : '';
  const npcRegistry = state.npcs.map(n => `${n.name}(${n.age}/${n.gender}/${n.relation}): ${n.appearance} | info:${n.info.join('; ')}`).join('\n');
  const plotEvents = state.sceneData.plotEvents.join(', ');
  return `你是COC 7e守秘人(KP)，正在跑「常暗之厢」。你的风格是一位经验丰富的人类KP：尊重台本、敬畏规则、克制发挥。

=========================================
三条铁律（不可违反，违反即崩剧本）
=========================================

【铁律一】遵守COC 7e规则书
- 检定：D100 ≤ 技能=成功；≤技能/2=困难成功；≤技能/5=极难成功；=01大成功；96-00大失败
- 检定触发条件：紧张时刻/有失败风险/对手抵抗时才需要；合理行动直接成功
- 失败处理：「是，但」或「不，而且」原则——失败不堵死路，用代价推进（受伤/SAN-1/拖延）
- HP=(CON+SIZ)/10 向下取整；SAN=POW；幸运=3D6×5
- DB表：2-64→-2, 65-84→-1, 85-124→0, 125-164→+1D4, 165-204→+1D6
- 临时疯狂：先过INT检定，失败持续1D10小时
- 禁止跨模组混用规则（如DND豁免检定）

【铁律二】遵守台本（这是最关键的一条）
- 你是台本的「守秘者」不是「作者」——剧本怎么写你就怎么演
- 主线事件必须发生：字条→报纸→乘务员→钥匙→驾驶室拉闸
- 关键道具必须在：3号车厢钥匙、4号车厢乘务员/撬棍、5号车厢手电
- 怪物行为固定：从车尾一节节吞噬，距离倒数到0=死亡
- 乘务员动机固定：想停车，但停车=全车死（玩家该加速）
- 禁止：临时发明新房间/新NPC/新线索/新危机/新结局分支
- 禁止：把"3号车厢的钥匙"挪到5号或藏到别处

【铁律三】只能小幅修改当前情况（像人类KP带团）
人类KP的实战经验：
1) 不杀PC out of nowhere（要给警告/逃脱机会）
2) 让每个技能都有用武之地（侦查+图书馆+话术+潜行都能用）
3) 用NPC作牺牲品升级恐怖（不给PC全伤害，NPC代受）
4) 失败的骰子是故事燃料（一次失败不毁整个调查）
5) 合理行动直接成功，不滥用检定
6) 不要替玩家做决定（给场景描述+选项，不替选）
7) 保持氛围但不剧透（描述感觉不解释原因）

允许的「小幅修改」：
- 玩家选择不同路径时，调整NPC的位置/反应（但不能删除NPC）
- 玩家的行动合理时，**门本来没锁/抽屉本来没锁**（让路通过）
- 用既有元素（车厢、乘务员、怪物、字条）变化出即兴细节
- 失败时给线索碎片代替"完全没收获"

禁止的「大幅修改」：
- 改变最终结局（必须能逃/必须被吞噬二选一）
- 改变核心NPC（乘务员必须存在且在4号车厢）
- 改变物品位置（钥匙必须在3号车厢某处）
- 发明新模组剧情（绝对禁止）

=========================================
回复规则
=========================================
- 1-2段中文，简洁叙事；不用列表/JSON
- 用台本内置文本为主，氛围描写为辅（"雨敲打窗户...听到阁楼有节奏的敲击声"）
- D100检定：≤技能/2=困难，≤技能/5=极难，01=大成功，96-00=大失败
- 失败=「是，但」推进（受伤、暴露、被听见、浪费时间）
- 怪物距离自动倒数（8→7→6...），不要太慢也不要太快
- SAN损失分梯度：-1（不安）/ -1D3（轻度）/ -1D6（重度）/ -1D10（直面）
- 结尾给2-3个清晰选项，方便玩家接话
- 禁止OOC：不要解释你在做什么，不要说「作为AI」/「根据规则书」
- 单条回复≤120字

}

      body: JSON.stringify({ model:s.model, messages:[{role:'system',content:getSystemPrompt()},{role:'user',content:userInput}], temperature:0.85, max_tokens:800 })

/* ========== 骰娘快捷指令（别名） ========== */
function sendDiceCmd(cmd) { handleDiceCmd(cmd); }

/* ========== 骰娘命令解析 ========== */
function handleDiceCmd(cmd) {
  // 骰娘式指令: .r 1d100, .ra 侦查, .sc 0/1d6, .en, .ti, .coc
  const c = state.investigator;
  if (cmd.startsWith('.r ')) {
    const formula = cmd.slice(3).trim();
    const match = formula.match(/(\d*)d(\d+)/i);
    if (match) { const cnt = parseInt(match[1])||1, sides = parseInt(match[2]); const r = diceRoll(sides,cnt); addMsg('dice',`🎲 ${r.str}`); }
    else { const d = d100(); addMsg('dice',`🎲 D100=${d}`); }
    return true;
  }
  if (cmd.startsWith('.ra ')) {
    const skill = cmd.slice(4).trim();
    if (c && c.skills && c.skills[skill]) { skillRoll(skill); return true; }
    const val = parseInt(skill); if (!isNaN(val)) { const r = d100(); addMsg('dice',`🎲 检定: D100=${r}/${val} ${r<=val?'✅成功':'❌失败'}`); return true; }
    addMsg('dice',`🎲 未知技能「${skill}」，输入技能名或数值`);
    return true;
  }
  if (cmd.startsWith('.sc ')) {
    const p = cmd.slice(4).trim().split('/');
    if (c) {
      const r = d100();
      const pass = r <= c.san.current;
      // 解析损失: 成功/失败, 每个有 nDs 格式
      const successLoss = p[0] || (pass ? '1' : '0');
      const failLoss = p[1] || (pass ? '1' : '1');
      const lossStr = pass ? successLoss : failLoss;
      const loss = parseDiceFormula(lossStr);
      if (loss > 0) c.san.current = Math.max(0, c.san.current - loss);
      addMsg('dice', `🌀 SAN检定: D100=${r}/${c.san.current} ${pass?'✅成功':'❌失败'} (${pass?'-':'-'}${loss} SAN)`);
      if (loss >= 5) addMsg('tip', '⚠️ 单次损失≥5 SAN → 进入临时疯狂状态！', '理智警告');
      updateCharSheet();
    }
    return true;
  }
  if (cmd === '.en') {
    if (c) {
      const r = d100();
      addMsg('dice', `📈 技能成长检定: D100=${r} ${r<=1?'🔥大成功(技能+1D6)':r<=5?'💫成功(技能+1)':r>=96?'💀失败(技能-1D6)':'⏸无变化'}`);
    } else { addMsg('dice','📈 技能成长检定: 请先创建角色'); }
    return true;
  }
  if (cmd === '.ti') {
    const tbl = ['失忆','心身残疾(盲/聋/瘫)','暴力倾向','偏执妄想','人际依赖','昏厥','惊慌逃窜','歇斯底里','恐惧症','躁狂症'];
    const r = Math.floor(Math.random()*10); addMsg('dice',`🌀 疯狂发作: ${r+1}. ${tbl[r]}（持续1D10轮）`);
    return true;
  }
  if (cmd === '.coc') {
    const s = `STR:${roll3d6x5()} CON:${roll3d6x5()} SIZ:${roll2d6plus6x5()} DEX:${roll3d6x5()} APP:${roll3d6x5()} INT:${roll2d6plus6x5()} POW:${roll3d6x5()} EDU:${roll2d6plus6x5()}`;
    addMsg('dice',`🎲 COC属性生成: ${s}`);
    return true;
  }
  if (cmd.startsWith('.help')) {
    addMsg('system','📖 骰娘指令: .r 1d100 掷骰 | .ra 技能名 检定 | .sc 理智检定 | .ti 疯狂症状 | .coc 生成属性 | .en 成长检定', 'system');
    return true;
  }
  return false;
}

  if (!c) { showToast('先创建角色吧'); return; }
  const overlay = document.createElement('div'); overlay.className = 'modal-overlay'; overlay.id = 'char-view-modal';
  const attrs = c.attrs;
  const attrHtml = Object.entries(attrs).map(([k,v]) => {
    const t = getTier(v);
    return `<div class="attr-box"><div class="an">${ATTR_SHORT[k]}<br><span style="font-size:8px;color:var(--text-muted)">${k.toUpperCase()}</span></div><div class="av">${v}</div><span class="attr-tier ${t.cls}">${t.label}</span></div>`;
  }).join('');
  const skillHtml = c.skills ? Object.entries(c.skills).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`<div class="stat-row"><span class="label">${k}</span><span class="value">${v}%</span></div>`).join('') : '';
  overlay.innerHTML = `<div class="modal" style="width:580px;max-height:90vh;overflow-y:auto">
    <h3>📋 ${c.name} ${c.occ?'('+c.occ+')':''}</h3>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
      <div style="font-size:11px;color:var(--text-muted)">HP: ${c.hp.current}/${c.hp.max} | SAN: ${c.san.current}/${c.san.max} | LUCK: ${c.luck.current}</div>
      <div style="font-size:11px;color:var(--text-muted)">DB: ${c.db} | MOV: ${c.mov||8} | ${c.age||'?'}岁 | ${c.gender||'?'}</div>
    </div>
    <h4 style="font-size:12px;color:var(--eldritch-teal);margin-bottom:6px">🎲 属性</h4>
    <div class="attr-mini" style="grid-template-columns:1fr 1fr 1fr 1fr">${attrHtml}</div>
    <h4 style="font-size:12px;color:var(--eldritch-teal);margin:10px 0 6px">⭐ 技能</h4>
    <div id="skills-list" style="max-height:200px;overflow-y:auto">${skillHtml||'<div style="color:var(--text-muted)">无</div>'}</div>
    <div style="margin-top:10px;padding:8px;background:var(--bg-tertiary);border-radius:var(--radius);font-size:11px;color:var(--text-muted)">
      ${c.bg||'无背景故事'}
    </div>
    <button class="btn-secondary" onclick="document.getElementById('char-view-modal').remove()" style="margin-top:10px">关闭</button>
  </div>`;
  document.body.appendChild(overlay);
  overlay.onclick = function(e) { if(e.target===overlay) overlay.remove(); };
}

/* ========== NPC系统 ========== */
function registerNPC(id, name, data) {
  if (state.npcs.find(n => n.id === id)) return;  // 已存在不重复添加
  const npc = { id, name, age:'?', gender:'?', appearance:'待观察', notes:'', info:[], firstSeen:state.sceneData.currentCar, relation:'neutral', ...data };
  state.npcs.push(npc);
  renderNPCList();
  autoSave();
  // 弹提示
  showToast(`📇 新NPC: ${npc.name}`);
  return npc;
}

function updateNPCInfo(id, key, value) {
  const npc = state.npcs.find(n => n.id === id);
  if (!npc) return;
  if (key === 'info') npc.info = [...new Set([...npc.info, value])];  // 去重添加
  else npc[key] = value;
  renderNPCList();
  autoSave();
}

function openNPCCard(npcId) {
  const npc = state.npcs.find(n => n.id === npcId);
  if (!npc) return;
  // 关键修复#10：所有用户/AI 注入字段必须 escape，防 XSS
  const esc = escapeHTML;
  const overlay = document.createElement('div'); overlay.className = 'modal-overlay'; overlay.id = 'npc-card-modal';
  const infoHtml = npc.info.map(i => `<div style="font-size:11px;padding:4px 0;border-bottom:1px solid var(--border);color:var(--eldritch-green)">📌 ${esc(i)}</div>`).join('');
  overlay.innerHTML = `<div class="modal" style="width:420px;max-height:80vh;overflow-y:auto">
    <h3>📇 ${esc(npc.name)}</h3>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px;font-size:12px">
      <div><span style="color:var(--text-muted)">年龄:</span> ${esc(npc.age)}</div>
      <div><span style="color:var(--text-muted)">性别:</span> ${esc(npc.gender)}</div>
      <div><span style="color:var(--text-muted)">关系:</span> <span style="color:${npc.relation==='friendly'?'var(--green-light)':npc.relation==='hostile'?'var(--crimson-light)':'var(--text-muted)'}">${npc.relation==='friendly'?'友好':npc.relation==='hostile'?'敌对':'中立'}</span></div>
      <div><span style="color:var(--text-muted)">首次出现:</span> 车厢#${esc(String(npc.firstSeen))}</div>
    </div>
    <h4 style="font-size:11px;color:var(--eldritch-teal);margin-bottom:4px">样貌特征</h4>
    <div style="font-size:12px;color:var(--text-secondary);padding:6px 8px;background:var(--bg-tertiary);border-radius:var(--radius);margin-bottom:8px">${esc(npc.appearance)}</div>
    <h4 style="font-size:11px;color:var(--eldritch-teal);margin-bottom:4px">获取的情报</h4>
    ${infoHtml || '<div style="font-size:11px;color:var(--text-muted);padding:8px">尚未获取到信息</div>'}
    <button class="btn-secondary" onclick="document.getElementById('npc-card-modal').remove()" style="margin-top:10px">关闭</button>
  </div>`;
  document.body.appendChild(overlay);
  overlay.onclick = function(e) { if(e.target===overlay) overlay.remove(); };
}

function renderNPCList() {
  const el = document.getElementById('npc-list');
  if (state.npcs.length === 0) {
    el.innerHTML = '<div style="font-size:11px;color:var(--text-muted);text-align:center;padding:12px">探索中会遇到角色…</div>';
    return;
  }
  el.innerHTML = state.npcs.map(n => {
    const color = n.relation==='friendly'?'var(--green-light)':n.relation==='hostile'?'var(--crimson-light)':'var(--text-muted)';
    return `<div class="npc-item" onclick="openNPCCard('${escapeHTML(n.id)}')" style="cursor:pointer">
      <span class="npc-name">${escapeHTML(n.name)}</span>
      <span class="npc-rel" style="color:${color};font-size:10px">${n.relation==='friendly'?'友好':n.relation==='hostile'?'敌对':'中立'}${n.info.length?' ('+n.info.length+')':''}</span>
    </div>`;
  }).join('');
}

// ==================== SAVE ====================
function saveGame() {
  // 把当前 investigator 写回 investigators 列表（关键修复#7：只用 state.investigator.id）
  if (state.investigator) {
    const invId = state.investigator.id;
    if (invId) {
      const idx = state.investigators.findIndex(i => i.id === invId);
      if (idx >= 0) state.investigators[idx] = JSON.parse(JSON.stringify(state.investigator));
      else state.investigators.push(JSON.parse(JSON.stringify(state.investigator)));
    }
  }
  saveCurrentSession();
  autoSave();
  showToast('游戏已保存 💾');
}
function autoSave() {
  // 同步当前 investigator → investigators（关键修复#7：删除 state.investigatorId 字段引用）
  if (state.investigator && state.investigator.id) {
    const idx = state.investigators.findIndex(i => i.id === state.investigator.id);
    if (idx >= 0) state.investigators[idx] = JSON.parse(JSON.stringify(state.investigator));
  }
  saveCurrentSession();
  localStorage.setItem('coc-kp-state', JSON.stringify(state));
}
function resetGame() {
  if (!confirm('⚠️ 确认重置？所有游戏进度、角色和对话将被清除（设置保留）。')) return;
  localStorage.removeItem('coc-kp-state');
  const keptSettings = state.settings;
  state = {
    investigators: [],
    sessions: [],
    currentSessionId: null,
    currentScenarioId: null,
    currentView: 'home',
    investigator: null,
    gamePhase: 'idle',
    clues: [], npcs: [],
    tutorialStep: 0, tutorialDone: false,
    sceneData: { currentCar:1, conductorAwake:false, hasKey:false, hasCrowbar:false, hasFlashlight:false, warningsTriggered:[], monsterDistance:8, plotLock:['conductor_helper','key_location','finale_brake'], plotEvents:[] },
    settings: keptSettings
  };
  goHome();
  showToast('🔄 已重置，可以开始新冒险');
}
function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2000);
}

// ==================== INIT ====================
document.addEventListener('DOMContentLoaded', () => {
  init();
  document.getElementById('user-input').addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 100) + 'px';
  });
});
